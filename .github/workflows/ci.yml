name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-build-and-test:
    name: Linux gRPC build and tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            openssl \
            protobuf-compiler \
            libprotobuf-dev \
            libprotoc-dev
      
      - name: Build and install gRPC
        run: |
          cd /tmp
          git clone --depth 1 --branch v1.54.0 https://github.com/grpc/grpc.git
          cd grpc
          git submodule update --init --depth 1
          mkdir -p cmake/build
          cd cmake/build
          cmake ../.. \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DgRPC_INSTALL=ON \
            -DgRPC_BUILD_TESTS=OFF \
            -DgRPC_PROTOBUF_PROVIDER=package \
            -DgRPC_SSL_PROVIDER=package
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      
      - name: Verify installations
        run: |
          protoc --version
          pkg-config --modversion protobuf
          ls /usr/lib/cmake/grpc/ || echo "grpc cmake dir"
          ls /usr/lib/cmake/protobuf/ || echo "protobuf cmake dir"
      
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON
      
      - name: Build
        run: |
          cmake --build build --target \
            accel_server \
            accel_client_a \
            accel_client_b \
            accel_unit_tests \
            accel_model_tests \
            accel_tls_tests
      
      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure
